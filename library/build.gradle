plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace = 'com.github.pioneerredpanthers.prplib'
    
    compileSdk 34
    defaultConfig {
        minSdk 24
        targetSdk 34
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8

        // Use Java 8 toolchain even if system JDK is newer
    
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }

    // Needed for Maven publishing with sources + javadoc
    publishing {
        singleVariant('release') {
            withSourcesJar()
            withJavadocJar()
        }
    }

    testOptions {
        unitTests.returnDefaultValues = true
        unitTests.all {
            useJUnitPlatform()
        }
    }
}

dependencies {
    // FTC SDK dependencies (compileOnly so they don’t get bundled)
    compileOnly 'org.firstinspires.ftc:RobotCore:10.1.0'
    compileOnly 'org.firstinspires.ftc:Hardware:10.1.0'
    compileOnly 'org.firstinspires.ftc:FtcCommon:10.1.0'

    // Android dependencies
    compileOnly 'androidx.appcompat:appcompat:1.2.0'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Publishing setup for local Maven
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release

                groupId = 'com.github.pioneerredpanthers'
                artifactId = 'prplib'
                version = '0.0.1'

                pom {
                    name = 'PRPLib'
                    description = 'A utility and command based programming library for FTC'
                    url = 'https://github.com/pantherrobotics/PRPLib'

                    licenses {
                        license {
                            name = 'MIT License'
                            url = 'https://opensource.org/licenses/MIT'
                        }
                    }

                    developers {
                        developer {
                            id = 'redpantherrobotics'
                            name = 'Red Panther Robotics'
                        }
                    }

                    scm {
                        connection = 'scm:git:git://github.com/pantherrobotics/PantherCommandLib.git'
                        developerConnection = 'scm:git:ssh://github.com/pantherrobotics/PantherCommandLib.git'
                        url = 'https://github.com/pantherrobotics/PRPLib'
                    }
                }
            }
        }

        repositories {
            // For local testing
            mavenLocal()
        }
    }
}
